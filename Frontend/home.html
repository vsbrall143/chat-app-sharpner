<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - Chat App</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/home.js" defer></script>
  </head>
  <body>
    <!-- Header Section -->
    <div class="header">
      Chat App
      <button id="logout-button" onclick="logout()">Logout</button>
      <button id="create-group-button" onclick="showCreateGroupModal()">Create Group</button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
      <!-- Group List -->
      <div class="pending-invites" id="pending-invites">
        <h3>Pending Invitations</h3>
        <!-- Dynamic list of invitations will be added here -->
      </div>

      <div class="groups" id="groups">
        <!-- Dynamic group list will be appended here -->
        <!-- Example group with an invite button -->
        <div class="group" id="group-1">
          Group Name
          <button onclick="showInviteModal(1)">Invite</button>
          <!-- Pass group ID dynamically -->
        </div>
      </div>

      <!-- Chat Window -->
      <div class="chat-window">
        <!-- Group Members Section -->
        <div id="group-members" class="group-members">
          <h3>Group Members</h3>
          <ul id="members-list">
            <!-- List of group members will be dynamically populated here -->
          </ul>
        </div>

        <!-- Messages Section -->
        <div class="messages" id="messages">
          <!-- Dynamic messages will be appended here -->
        </div>

        <!-- Send Box -->
        <div class="send-box">
          <input type="text" id="message-input" placeholder="Type a message" />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <!-- Modal for Inviting Members -->
    <div id="invite-modal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close" onclick="closeInviteModal()">&times;</span>
        <h3>Invite to Group</h3>
        <input
          type="email"
          id="invite-email-input"
          placeholder="Enter user's email"
        />
        <button onclick="inviteToGroup()">Send Invite</button>
      </div>
    </div>

    <!-- Modal for Group Creation -->
    <div id="create-group-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="close" onclick="closeCreateGroupModal()">&times;</span>
        <h3>Create Group</h3>
        <input type="text" id="group-name-input" placeholder="Enter group name" />
        <button onclick="createGroup()">Create</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="home.js"></script>
 
  </body>
</html>
